name: Verify

on:
  push:
    branches:
      - main
    paths-ignore:
      - CHANGELOG.md
      - Gemfile.lock
      - lib/coach_zed/version.rb

  pull_request:

jobs:
  standard:
    name: Standard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Check formatting
        run: bundle exec standardrb

  rspec:
    name: RSpec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Check bundler version
        run: bundle --version
      - name: Run specs
        run: bundle exec rspec

  steep:
    name: Steep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Type check
        run: bundle exec steep check
