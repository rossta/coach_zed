name: Release

on:
  workflow_run:
    workflows:
      - Verify
    branches:
      - main
    types:
      - completed

permissions:
  contents: write
  id-token: write

jobs:
  release:
    environment: release
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install git-mkver
        uses: cperezabo/setup-git-mkver@v1
        with:
          version: "1.3.0"

      - name: Debug
        run: |
          ruby --version
          bundle --version
      - name: Fetch git history and tags
        run: git fetch --tags --prune --prune-tags -f origin

      - name: Determine release version
        id: release
        run: |
          VERSION="$(git mkver -c mkver.conf next)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version file for packaging
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git mkver -c mkver.conf patch

      - name: Refresh Bundler lockfile
        run: bundle install
        env:
          BUNDLE_FROZEN: "false"
          BUNDLE_DEPLOYMENT: "false"

      - name: Update changelog
        run: |
          npx --yes conventional-changelog-cli -p conventionalcommits -i CHANGELOG.md -s

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release changes
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git add CHANGELOG.md Gemfile.lock lib/coach_zed/version.rb
          git commit -m "chore(release): v$VERSION"

      - name: Tag release
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Publish gem to RubyGems
        uses: rubygems/release-gem@v1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body_path: CHANGELOG.md
          files: pkg/*.gem
