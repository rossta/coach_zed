name: Release

on:
  workflow_run:
    workflows:
      - Verify
    branches:
      - main
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_commit.message || '', '[skip release]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Install git-mkver
        uses: cperezabo/setup-git-mkver@v1
        with:
          version: "1.3.0"

      - name: Fetch git history and tags
        run: git fetch --tags --prune --prune-tags -f origin

      - name: Determine release version
        id: release
        run: |
          VERSION="$(git mkver -c mkver.conf next 2>/dev/null || true)"
          CURRENT_VERSION="$(ruby -e 'require "./lib/coach_zed/version"; puts CoachZed::VERSION')"

          if [ -z "$VERSION" ] || [ "$VERSION" = "$CURRENT_VERSION" ]; then
            echo "No version bump detected. Skipping release."
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip_release=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version file for packaging
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git mkver -c mkver.conf patch

      - name: Update changelog
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: |
          npx --yes conventional-changelog-cli -p conventionalcommits -i CHANGELOG.md -s

      - name: Build gem
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: |
          bundle config set frozen false
          bundle config set deployment false
          bundle exec rake build

      - name: Configure git author
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release changes
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git add CHANGELOG.md Gemfile.lock lib/coach_zed/version.rb
          git commit -m "chore(release): v$VERSION [skip release]"

      - name: Tag release
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"

      - name: Push release commit and tag
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        run: git push origin HEAD:main --follow-tags

      - name: Push gem to RubyGems
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push pkg/*.gem

      - name: Publish GitHub release
        if: ${{ steps.release.outputs.skip_release != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body_path: CHANGELOG.md
          files: pkg/*.gem
