pre-commit:
  parallel: true
  jobs:
    - name: standard
      glob: "*.rb"
      run: bundle exec standardrb -- {all_files}
      # exclude:
      #   - lib/example.rb

    - name: rspec
      run: bundle exec rspec -- {files}

    - name: "rbs"
      glob: "{lib,sig}/**/*.{rb,rbs}"
      run: bundle exec steep check
