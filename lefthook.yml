#
#     - name: gems audit
#       tags:
#         - backend
#         - security
#       run: bundle audit
#
pre-commit:
  parallel: true
  jobs:
    - name: standard
      glob: "**/*.rb"
      run: bundle exec standardrb --fix --format progress -- {staged_files}

    - name: rspec
      glob: "{lib,spec}/**/*.rb"
      run: bundle exec rspec --format progress

    - name: steep
      glob: "{lib,sig}/**/*.{rb,rbs}"
      run: bundle exec steep check
